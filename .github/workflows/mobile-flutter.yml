name: Mobile Flutter

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-flutter.yml"
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-flutter.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$FIREBASE_GOOGLE_SERVICES_JSON" ]; then
            echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          else
            echo "::warning::FIREBASE_GOOGLE_SERVICES_JSON secret not set — skipping debug build"
          fi

      - name: Build Android (debug)
        run: flutter build appbundle --debug

  ios-build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Google Services Plist
        env:
          FIREBASE_GOOGLE_SERVICES_PLIST: ${{ secrets.FIREBASE_GOOGLE_SERVICES_PLIST }}
        run: |
          if [ -n "$FIREBASE_GOOGLE_SERVICES_PLIST" ]; then
            echo "$FIREBASE_GOOGLE_SERVICES_PLIST" | base64 -d > ios/Runner/GoogleService-Info.plist
          else
            echo "::warning::FIREBASE_GOOGLE_SERVICES_PLIST secret not set — iOS build may fail"
          fi

      - name: Build iOS (release)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-build
          path: mobile/build/ios/iphoneos/Runner.app
          retention-days: 7
