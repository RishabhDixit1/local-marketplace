name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: serviq:latest
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package deploy artifacts
        run: |
          docker save serviq:latest | gzip > /tmp/serviq-docker.tar.gz
          cp docker-compose.yml /tmp/deploy-docker-compose.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: serviq-deploy
          path: |
            /tmp/serviq-docker.tar.gz
            /tmp/deploy-docker-compose.yml
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: serviq-deploy

      - name: Copy artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "serviq-docker.tar.gz,deploy-docker-compose.yml"
          target: /home/ec2-user/serviq
          strip_components: 0

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user/serviq

            # Create .env.ec2 from secrets if it doesn't exist
            if [ ! -f .env.ec2 ]; then
              cat > .env.ec2 << 'ENVEOF'
            NODE_ENV=production
            SUPABASE_URL=http://54.253.40.174:8000
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            BACKUP_EMAIL_API_KEY=${{ secrets.BACKUP_EMAIL_API_KEY }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            SERVIQ_INTERNAL_PUSH_KEY=${{ secrets.SERVIQ_INTERNAL_PUSH_KEY }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_EMAIL=${{ secrets.VAPID_EMAIL }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            ENVEOF
              echo "Created .env.ec2"
            else
              echo ".env.ec2 already exists, keeping existing"
            fi

            # Replace docker-compose.yml (CI version is authoritative)
            mv deploy-docker-compose.yml docker-compose.yml

            # Load the new image
            gzip -d -f serviq-docker.tar.gz
            docker load -i serviq-docker.tar
            rm -f serviq-docker.tar

            # Start via docker-compose (reads .env.ec2 automatically)
            docker compose up -d --remove-orphans

            # Health check
            echo "Waiting for container to be healthy..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "Deploy successful — container is healthy!"
                docker compose ps
                exit 0
              fi
              sleep 4
            done

            echo "ERROR: Health check failed after 60s"
            docker compose logs --tail 50
            exit 1
          command_timeout: 5m
