name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: NEXT_TELEMETRY_DISABLED=1 npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Package build artifacts
        run: |
          tar czf /tmp/serviq-build.tar.gz \
            --exclude='public/app/releases/*.apk' \
            .next \
            public \
            package.json \
            package-lock.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: serviq-build
          path: /tmp/serviq-build.tar.gz
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: serviq-build

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: serviq-build.tar.gz
          target: /home/ec2-user/serviq
          strip_components: 0

      - name: Extract and restart on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /home/ec2-user/serviq
            tar xzf serviq-build.tar.gz
            rm serviq-build.tar.gz
            npm ci --production --prefer-offline

            cat > ecosystem.config.js << 'ENDCONFIG'
            module.exports = {
              apps: [{
                name: "serviq",
                cwd: "/home/ec2-user/serviq",
                script: "node_modules/next/dist/bin/next",
                args: "start",
                env: {
                  NODE_ENV: "production",
                  NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}",
                  NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}",
                  SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}",
                  NEXT_PUBLIC_SITE_URL: "${{ secrets.NEXT_PUBLIC_SITE_URL }}",
                  BACKUP_EMAIL_API_KEY: "${{ secrets.BACKUP_EMAIL_API_KEY }}",
                  SENTRY_DSN: "${{ secrets.SENTRY_DSN }}",
                  RAZORPAY_KEY_ID: "${{ secrets.RAZORPAY_KEY_ID }}",
                  RAZORPAY_KEY_SECRET: "${{ secrets.RAZORPAY_KEY_SECRET }}",
                  SERVIQ_INTERNAL_PUSH_KEY: "${{ secrets.SERVIQ_INTERNAL_PUSH_KEY }}",
                  VAPID_PUBLIC_KEY: "${{ secrets.VAPID_PUBLIC_KEY }}",
                  VAPID_PRIVATE_KEY: "${{ secrets.VAPID_PRIVATE_KEY }}",
                  VAPID_EMAIL: "${{ secrets.VAPID_EMAIL }}",
                  FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}",
                  FIREBASE_SERVICE_ACCOUNT_JSON: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"
                }
              }]
            };
            ENDCONFIG

            pm2 delete serviq 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
          command_timeout: 5m
