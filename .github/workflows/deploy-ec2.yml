name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: serviq:latest
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package deploy artifact
        run: docker save serviq:latest | gzip > /tmp/serviq-docker.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: serviq-deploy
          path: /tmp/serviq-docker.tar.gz
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: serviq-deploy

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: serviq-docker.tar.gz
          target: /home/ec2-user/serviq
          strip_components: 0

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ec2-user/serviq

            # Create .env.ec2 from secrets if it doesn't exist
            if [ ! -f .env.ec2 ]; then
              cat > .env.ec2 << 'ENVEOF'
            NODE_ENV=production
            SUPABASE_URL=http://54.253.40.174:8000
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            BACKUP_EMAIL_API_KEY=${{ secrets.BACKUP_EMAIL_API_KEY }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            SERVIQ_INTERNAL_PUSH_KEY=${{ secrets.SERVIQ_INTERNAL_PUSH_KEY }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_EMAIL=${{ secrets.VAPID_EMAIL }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            ENVEOF
              echo "Created .env.ec2"
            else
              echo ".env.ec2 already exists, keeping existing"
            fi

            # Load the new image
            gzip -d -f serviq-docker.tar.gz
            docker load -i serviq-docker.tar
            rm -f serviq-docker.tar

            # Kill ANY process on port 3000 (handles orphan containers, old PM2/node, etc.)
            docker ps -q --filter publish=3000 | xargs -r docker stop --time 10 2>/dev/null || true
            docker ps -q --filter publish=3000 | xargs -r docker rm -f 2>/dev/null || true
            docker stop serviq --time 10 2>/dev/null || true
            docker rm serviq 2>/dev/null || true
            fuser -k 3000/tcp 2>/dev/null || true

            # Start via docker run with env_file (avoids docker-compose build issue on older Docker)
            docker run -d \
              --name serviq \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file .env.ec2 \
              serviq:latest

            # Wait for container health (uses Docker HEALTHCHECK, no curl/wget needed on host)
            echo "Waiting for container to be healthy..."
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' serviq 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "Deploy successful — container is healthy!"
                docker ps --filter name=serviq --format "table {{.ID}}\t{{.Image}}\t{{.Status}}"
                exit 0
              fi
              # Also succeed if running but no healthcheck configured
              if [ "$STATUS" = "unknown" ]; then
                RUNNING=$(docker inspect --format='{{.State.Running}}' serviq 2>/dev/null)
                if [ "$RUNNING" = "true" ]; then
                  echo "Deploy successful — container is running!"
                  docker ps --filter name=serviq --format "table {{.ID}}\t{{.Image}}\t{{.Status}}"
                  exit 0
                fi
              fi
              sleep 4
            done

            echo "ERROR: Health check failed after 60s (status: $STATUS)"
            docker ps --filter name=serviq --format "table {{.ID}}\t{{.Image}}\t{{.Status}}" 2>/dev/null || true
            docker logs serviq --tail 50 2>/dev/null || true
            exit 1
          command_timeout: 5m
